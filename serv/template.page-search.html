<script>
  /////////////////////////////////////////
  // Mark search terms and scroll logic
  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function parseSearchTerms(term) {
    if (!term) return [];
    return term
      .split(',')
      .map(part => {
        const trimmed = part.trim();
        if (!trimmed) return null;
        const hasQuotes = trimmed.length >= 2 && trimmed.startsWith('"') && trimmed.endsWith('"');
        return hasQuotes ? trimmed.slice(1, -1) : trimmed;
      })
      .filter(Boolean);
  }

  function markupSearchTerms(term) {
    const terms = parseSearchTerms(term);
    if (terms.length === 0) return;

    const searchRegex = new RegExp(terms.map(escapeRegex).join('|'), 'gi');
    const container = document.getElementById('the-scroll-page');
    if (!container) return;

    clearMarks();

    // Get all text nodes
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
    const textNodes = [];
    let node;
    while ((node = walker.nextNode())) {
      if (node.parentNode && !['SCRIPT', 'STYLE'].includes(node.parentNode.tagName)) {
        textNodes.push(node);
      }
    }

    // Replace matches with <mark>
    textNodes.forEach(textNode => {
      const replaced = textNode.nodeValue.replace(searchRegex, match => `<mark>${match}</mark>`);
      if (replaced !== textNode.nodeValue) {
        const span = document.createElement('span');
        span.innerHTML = replaced;
        textNode.parentNode.replaceChild(span, textNode);
      }
    });
  }

  function saveModePreference() {
    localStorage.setItem( "search-mode", document.getElementById('search-mode').innerHTML )
  }
  function loadModePreference() {
    document.getElementById('search-mode').innerHTML = localStorage.getItem( "search-mode" ) ? localStorage.getItem( "search-mode" ) : search_mode_init_text
  }

  function getSearchTermFromURL() {
    const url = new URL(window.location.href);
    const params = new URLSearchParams(url.search);
    return params.get('searchterm') || '';
  }

  // Navigation logic
  let currentIndex = 0;
  let buttonNavigationSessionTimer = null;
  const buttonNavigationSessionMs = 1200;

  function clearButtonNavigationSession() {
    if (buttonNavigationSessionTimer) {
      clearTimeout(buttonNavigationSessionTimer);
      buttonNavigationSessionTimer = null;
    }
  }

  function startButtonNavigationSession() {
    clearButtonNavigationSession();
    buttonNavigationSessionTimer = setTimeout(() => {
      buttonNavigationSessionTimer = null;
    }, buttonNavigationSessionMs);
  }

  function isButtonNavigationSessionActive() {
    return buttonNavigationSessionTimer !== null;
  }

  function getNavOffset() {
    const style = getComputedStyle(document.documentElement);
    const value = parseFloat(style.getPropertyValue('--page-title-height'));
    return Number.isFinite(value) ? value : 0;
  }

  function scrollElementWithNavOffset(element, behavior = 'smooth') {
    if (!element) return;
    const navOffset = getNavOffset();
    const rect = element.getBoundingClientRect();
    const absoluteTop = window.scrollY + rect.top;
    window.scrollTo({
      top: absoluteTop - navOffset,
      left: window.scrollX,
      behavior
    });
  }

  function scrollToMark(index) {
    const marks = document.querySelectorAll('mark');

    if (marks.length === 0) return;

    // disable "goto next/prev mark" wrap-around.
    //if (index < 0 || index >= marks.length) return;

    currentIndex = ((index % marks.length) + marks.length) % marks.length;
    scrollElementWithNavOffset(marks[currentIndex]);

    // set the style on the marks
    let counter = 0;
    marks.forEach(mark => {
      if (counter++ === currentIndex)
        mark.className = 'selected';
      else
        mark.removeAttribute('class');
    });

    updateCounterDisplay();
  }

  const scroll_snap_threshold_px = 8;
  function getMarkScrollTop(mark) {
    const navOffset = getNavOffset();
    const rect = mark.getBoundingClientRect();
    const absoluteTop = window.scrollY + rect.top;
    return absoluteTop - navOffset;
  }

  function getNearestMarkIndexAboveScroll(marks, scrollTop) {
    let idx = -1;
    for (let i = 0; i < marks.length; i++) {
      const markTop = getMarkScrollTop(marks[i]);
      if (markTop < scrollTop - scroll_snap_threshold_px) idx = i;
      else break;
    }
    return idx;
  }

  function getNearestMarkIndexBelowScroll(marks, scrollTop) {
    for (let i = 0; i < marks.length; i++) {
      const markTop = getMarkScrollTop(marks[i]);
      if (markTop > scrollTop + scroll_snap_threshold_px) return i;
    }
    return -1;
  }

  function clearHashForSearchNavigation() {
    if (!window.location.hash) return;
    const url = new URL(window.location.href);
    url.hash = '';
    window.history.pushState({}, document.title, url.toString());
  }

  function isSearching() {
    const controlDiv = document.getElementById('searchcontrol');
    return controlDiv.style.display != 'none'
  }
  function isSearchModeGlobal() {
    const searchMode = document.getElementById('search-mode')
    return searchMode.innerHTML == search_mode_global_text
  }
  function isSearchModeLocal() {
    const searchMode = document.getElementById('search-mode')
    return searchMode.innerHTML == search_mode_local_text
  }

  function updateCounterDisplay() {
    const marks = document.querySelectorAll('mark');
    const counter = document.getElementById('mark-counter');
    if (counter) {
      if (marks.length === 0) {
        counter.textContent = '0/0';
      } else {
        counter.textContent = `${currentIndex + 1}/${marks.length}`;
      }
    }
    updateSearchInstanceInURL(marks.length === 0 ? null : (currentIndex + 1));
  }

  function setCounterToMarkBeforeHash() {
    clearButtonNavigationSession();
    const hash = window.location.hash;
    if (!hash) return;
    const target = document.getElementById(hash.slice(1));
    if (!target) return;

    const marks = Array.from(document.querySelectorAll('mark'));
    if (marks.length === 0) {
      updateCounterDisplay();
      return;
    }

    const targetTop = target.getBoundingClientRect().top + window.scrollY;
    let idx = 0;
    for (let i = 0; i < marks.length; i++) {
      const markTop = marks[i].getBoundingClientRect().top + window.scrollY;
      if (markTop <= targetTop) idx = i;
      else break;
    }
    currentIndex = idx;
    updateCounterDisplay();
  }

  function nextMark() {
    const marks = document.querySelectorAll('mark');
    //if (currentIndex < (marks.length - 1)) {
      clearHashForSearchNavigation();
      if (isButtonNavigationSessionActive()) {
        startButtonNavigationSession();
        scrollToMark(currentIndex + 1);
        return;
      }
      if (marks.length > 0) {
        const scrollTop = window.scrollY;
        const nearestBelow = getNearestMarkIndexBelowScroll(marks, scrollTop);
        if (nearestBelow === currentIndex) {
          startButtonNavigationSession();
          scrollToMark(currentIndex);
          return;
        }
      }
      startButtonNavigationSession();
      scrollToMark(currentIndex + 1);
    //}
  }

  function prevMark() {
    //if (currentIndex > 0) {
      clearHashForSearchNavigation();
      if (isButtonNavigationSessionActive()) {
        startButtonNavigationSession();
        scrollToMark(currentIndex - 1);
        return;
      }
      const marks = document.querySelectorAll('mark');
      if (marks.length > 0) {
        const scrollTop = window.scrollY;
        const nearestAbove = getNearestMarkIndexAboveScroll(marks, scrollTop);
        if (nearestAbove === currentIndex) {
          startButtonNavigationSession();
          scrollToMark(currentIndex);
          return;
        }
      }
      startButtonNavigationSession();
      scrollToMark(currentIndex - 1);
    //}
  }

  function clearMarks() {
    const container = document.getElementById('the-scroll-page');
    if (!container) return;
    const oldMarks = container.querySelectorAll('mark');

    oldMarks.forEach(mark => {
      const prevNode = mark.previousSibling;
      const nextNode = mark.nextSibling;
      
      const textContent = mark.textContent;

      let combinedText = textContent;
      
      if (prevNode && prevNode.nodeType === Node.TEXT_NODE) {
        combinedText = prevNode.textContent + combinedText;
        prevNode.remove();
      }

      if (nextNode && nextNode.nodeType === Node.TEXT_NODE) {
        combinedText += nextNode.textContent;
        nextNode.remove();
      }

      const textNode = document.createTextNode(combinedText);
      mark.replaceWith(textNode);
    });
  }

  // Helper to clear the searchterm from URL without reloading
  function clearSearchTermFromURL() {
    updateSearchTermInURL('')
  }

  function debounce(func, delay) {
    let timeoutId;
    return function(...args) {
      if (timeoutId) {
        clearTimeout(timeoutId);
      }
      timeoutId = setTimeout(() => {
        func.apply(this, args); // Call the function with the provided arguments
      }, delay);
    };
  }

  function updateSearchTermInURL(term) {
    const url = new URL(window.location.href);
    if (term === '') {
      url.searchParams.delete('searchterm');
      url.searchParams.delete('searchinstance');
      window.history.pushState({}, document.title, url.toString());
    } else {
      url.searchParams.set('searchterm', term);
      window.history.replaceState({}, document.title, url.toString());
    }
  }
  const debouncedUpdateSearchTermInURL = debounce(updateSearchTermInURL, 100);

  function getSearchInstanceFromURL() {
    const url = new URL(window.location.href);
    const value = parseInt(url.searchParams.get('searchinstance'), 10);
    if (!Number.isFinite(value) || value <= 1) return 0;
    return value - 1;
  }

  function updateSearchInstanceInURL(instance) {
    const url = new URL(window.location.href);
    if (!instance || instance <= 1) {
      url.searchParams.delete('searchinstance');
    } else {
      url.searchParams.set('searchinstance', instance);
    }
    window.history.replaceState({}, document.title, url.toString());
  }

  function focusSearchEditBox() {
    const searchBox = document.getElementById('search-box');
    searchBox.focus();  // focus the input box
    searchBox.select(); // selects all the text
  }

  const search_mode_init_text = "!!! mode !!!";
  const search_mode_global_text = "🌎&nbsp;All&nbsp;Pages";
  const search_mode_local_text = "▼&nbsp;Page";
  // is meant to be called once on init() to initialize.   keep that in mind.
  function toggleMode(forcemode=undefined, options={}) {
    const should_focus_input = options && options.focus_input !== undefined ? options.focus_input : true;
    const searchMode = document.getElementById('search-mode')
    if (forcemode) {
      searchMode.innerHTML = forcemode
    } else {
      if (searchMode.innerHTML == search_mode_init_text) {
        loadModePreference()
        searchMode.innerHTML = searchMode.innerHTML == search_mode_init_text ? search_mode_local_text : searchMode.innerHTML
      } else {
        searchMode.innerHTML = searchMode.innerHTML != search_mode_local_text ? search_mode_local_text : search_mode_global_text;
      }
    }
    saveModePreference();
    document.getElementById('mark-counter').style.display = searchMode.innerHTML == search_mode_local_text ? 'inline-block' : 'none' 
    document.getElementById('search-local-prev').style.display = searchMode.innerHTML == search_mode_local_text ? 'inline-block' : 'none' 
    document.getElementById('search-local-next').style.display = searchMode.innerHTML == search_mode_local_text ? 'inline-block' : 'none'
    document.getElementById('search-global-enter').style.display = searchMode.innerHTML == search_mode_global_text ? 'inline-block' : 'none'
    if (should_focus_input)
      focusSearchEditBox()
  }

  // Add search control UI
  // Helper to clear marks
  function addSearchControl(term, options={}) {
    const should_focus_input = options && options.focus_input !== undefined ? options.focus_input : true;
    const controlDiv = document.getElementById('searchcontrol');
    if (!controlDiv) return;

    controlDiv.style.display = 'block';
    controlDiv.innerHTML = `
      <div class="search-inner" style="display: flex; justify-content: flex-end; align-items: center; gap: 0.3rem; width: 100%; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;">
        <button id="search-mode" style="width:auto; padding-left: 0.25rem; padding-right: 0.25rem; user-select: none; -webkit-user-select: none;">!!! mode !!!</button>
        <input id="search-box" type="text" value="" style="user-select: text; -webkit-user-select: text;">
        <span id="mark-counter" style="user-select: none; -webkit-user-select: none;">0/0</span>
        <button id="search-local-prev" style="user-select: none; -webkit-user-select: none;"><img class="buttonsvg" src="/<%=ASSETS_MAGIC%>/keyboard_arrow_up_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg"></button>
        <button id="search-local-next" style="user-select: none; -webkit-user-select: none;"><img class="buttonsvg" src="/<%=ASSETS_MAGIC%>/keyboard_arrow_down_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg"></button>
        <button id="search-global-enter" style="width:auto; padding-left: 0.25rem; padding-right: 0.25rem; user-select: none; -webkit-user-select: none;">Search</button>
        <button id="search-clear" title="Clear search" style="font-weight: bold; font-size: 1.2rem; cursor: pointer; user-select: none; -webkit-user-select: none;"><img class="buttonsvg" src="/<%=ASSETS_MAGIC%>/close_small_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg"></button>
      </div>
    `;

    document.getElementById('search-local-prev').addEventListener('click', prevMark);
    document.getElementById('search-local-next').addEventListener('click', nextMark);
    document.getElementById('search-global-enter').addEventListener('click', () => {
      const rawValue = document.getElementById('search-box').value;
      const searchterm = rawValue.trim();
      const encodedTerm = encodeURIComponent(searchterm);
      const newurl = `<%=SEARCH_URL%>${searchterm !== '' ? `?searchterm=${encodedTerm}` : ''}`
      console.log( newurl )
      window.location.href = newurl;
    });

    const searchBox = document.getElementById('search-box');
    searchBox.value = term; // may have quotes in term, e.g. dont set the DOM innerHTML attribute with `${term}`
    searchBox.addEventListener('input', () => {
      clearHashForSearchNavigation();
      const newTerm = searchBox.value.trim();
      if (newTerm === '') {
        clearMarks();
        updateCounterDisplay();
      } else {
        markupSearchTerms(newTerm);
        const marks = document.querySelectorAll('mark');
        currentIndex = 0;
        updateCounterDisplay();
        if (marks.length > 0) {
          scrollToMark(0);
        }
      }

      debouncedUpdateSearchTermInURL( newTerm )
    });

    // Clear (X) button logic
    document.getElementById('search-clear').addEventListener('click', () => {
      onCancel();
    });

    // mode toggle
    const searchMode = document.getElementById('search-mode')
    toggleMode(undefined, { focus_input: should_focus_input }); // init mode
    searchMode.addEventListener('click', () => toggleMode(undefined, { focus_input: true }) );
  }


  // start the search
  function onSearch(options = { clear_hash: true }) {
    const clear_hash = options && options.clear_hash !== undefined ? options.clear_hash : true;
    const should_focus_input = options && options.focus_input !== undefined ? options.focus_input : true;
    // clean up if already up
    if (isSearching()) {
      onCancel( { clear_url: false, clear_hash } );
    }

    // Clear any anchor to avoid conflict with ?searchterm navigation
    if (clear_hash) clearHashForSearchNavigation();

    // invoke the search box
    const term = getSearchTermFromURL();
    if (term && term != '')
      markupSearchTerms(term);
    addSearchControl(term, { focus_input: should_focus_input });
    if (term && term != '')
      updateCounterDisplay();
    if (term && term != '' && !window.location.hash)
      requestAnimationFrame(() => scrollToMark(getSearchInstanceFromURL()));
  }

  // close the search
  function onCancel( options = { clear_url: true, clear_hash: false } ) {
    const clear_hash = options && options.clear_hash !== undefined ? options.clear_hash : false;
    const searchBox = document.getElementById('search-box');
    const controlDiv = document.getElementById('searchcontrol');

    // Clear input box
    searchBox.value = '';
    
      // Clear marks
    clearMarks();
    // Update counter display
    updateCounterDisplay();
    // Remove searchterm from URL (no reload)
    if (options.clear_url)
      clearSearchTermFromURL();
    if (clear_hash)
      clearHashForSearchNavigation();
    // Hide the search control bar if desired:
    controlDiv.style.display = 'none';
  }

  function getSelectedText() {
    let text = "";
    if (window.getSelection) {
      text = window.getSelection().toString();
      console.log( "getSelectedText:", text )
    } else if (document.selection && document.selection.type !== "Control") {
      // For old IE
      text = document.selection.createRange().text;
      console.log( "getSelectedText(IE):", text )
    }
    return text;
  }


  function applySearchStateFromURL() {
    const term = getSearchTermFromURL();
    if (term && term !== '') {
      search({ force: true, clear_hash: false, focus_input: false });
      toggleMode(search_mode_local_text, { focus_input: false });
      if (window.location.hash) {
        requestAnimationFrame(() => setCounterToMarkBeforeHash());
      }
    } else {
      if (isSearching()) {
        onCancel({ clear_url: false, clear_hash: false });
      }
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    applySearchStateFromURL();
  });

  window.addEventListener('popstate', () => {
    applySearchStateFromURL();
  });
  window.addEventListener('hashchange', () => {
    const term = getSearchTermFromURL();
    if (term && term !== '') {
      if (isSearching()) {
        markupSearchTerms(term);
        currentIndex = 0;
        requestAnimationFrame(() => setCounterToMarkBeforeHash());
      } else {
        search({ force: true, clear_hash: false, focus_input: false });
      }
    }
  });

  document.addEventListener('keydown', (e) => {
    // page handler
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
      e.preventDefault();

      // if text is selected on the page, update the ?searchterm= queryparam
      const term = getSelectedText();
      if (term != "")
        updateSearchTermInURL(term)

      // pop up search box (it'll use whatever's in the ?searchterm= queryparam)
      search({ force: true, clear_hash: true });
    }

    // handler active only when searching
    if (isSearching() && e.key === 'Enter') {
      if (isSearchModeLocal())
        nextMark();
      else
        document.getElementById('search-global-enter').click();
    }

    // handler active only when searching
    if (isSearching() && e.key === 'Escape') {
      onCancel();
    }
  });

  // toggle the search dialog, options.force will force open/close
  function search(options = {}) {
    if (options.force == false) {
      onCancel();
      return;
    }
    if (options.force == true) {
      onSearch(options);
      return;
    }

    // toggle...
    if (isSearching()) {
      onCancel();
    } else {
      onSearch();
    }
  }
  /////////////////////////////////////////
</script>
